name: Update Dashboard

on:
  schedule:
    - cron: '0 22 * * *'   # 07:00 KST daily (GitHub cron may be delayed a few min)
  workflow_dispatch:        # allow manual run from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build dashboard
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: node scripts/build.mjs

      - name: Commit updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/
          git diff --staged --quiet || git commit -m "chore: daily dashboard update [skip ci]"
          git push
